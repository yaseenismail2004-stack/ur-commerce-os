<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UR Storefront</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/ur-foundation.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg:#F5F8F4; --surface:#FFFFFF; --surface2:#E5EFE8; --ink:#17211C; --sub:#66736B;
      --brand:#6F8A4F; --accent:#1F7668; --border:#DAE5DC; --shadow:0 20px 50px rgba(23,33,28,0.1);
      --radius:var(--ur-radius-lg,18px); --font:var(--ur-font-ar,'IBM Plex Sans Arabic','Noto Kufi Arabic',sans-serif);
    }
    html { scroll-behavior: smooth; }
    body { margin:0; background:linear-gradient(180deg,color-mix(in srgb,var(--bg) 92%, white),var(--bg)); color:var(--ink); font-family:var(--font); -webkit-font-smoothing:antialiased; }
    button, input { font-family:inherit; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn { 0% { opacity:0; transform:scale(.86) translateY(16px); } 70% { opacity:1; transform:scale(1.035) translateY(-2px); } 100% { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes floatSoft { 0%,100% { transform:translateY(0) rotate(0deg); } 50% { transform:translateY(-13px) rotate(-.7deg); } }
    @keyframes slideIn { from { opacity:0; transform:translateX(22px); } to { opacity:1; transform:translateX(0); } }
    @keyframes shimmer { 0% { transform:translateX(-120%); opacity:0; } 25% { opacity:.35; } 100% { transform:translateX(160%); opacity:0; } }
    @keyframes ripple { from { transform:scale(0); opacity:.35; } to { transform:scale(22); opacity:0; } }
    @keyframes cartPulse { 0% { transform:scale(1); } 45% { transform:scale(1.18); } 100% { transform:scale(1); } }
    @keyframes flyToCart { 0% { transform:translate3d(0,0,0) scale(1); opacity:1; } 70% { opacity:.92; } 100% { transform:translate3d(var(--fly-x),var(--fly-y),0) scale(.18); opacity:0; } }
    @keyframes dotWave { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-4px); } }
    @keyframes glowSweep { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }
    body[data-motion="calm"] * { animation-duration:.2s !important; }
    body[data-motion="lively"] .float { animation:floatSoft 3s ease-in-out infinite; }
    body[data-motion="smooth"] .float { animation:floatSoft 5s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; scroll-behavior:auto !important; }
    }
    .wrap { min-height:100vh; overflow-x:hidden; }
    .scroll-progress { position:fixed; top:0; inset-inline-start:0; height:3px; width:0%; background:linear-gradient(90deg,var(--brand),var(--accent)); z-index:80; transition:width .08s linear; }
    .topbar { position:sticky; top:0; z-index:30; backdrop-filter:blur(18px); background:color-mix(in srgb, var(--bg) 78%, transparent); border-bottom:1px solid color-mix(in srgb, var(--border) 80%, transparent); }
    .topbar-inner { max-width:1180px; margin:auto; padding:14px 20px; display:flex; align-items:center; gap:16px; justify-content:space-between; }
    .brand { display:flex; align-items:center; gap:10px; min-width:0; }
    .logo { width:42px; height:42px; border-radius:14px; background:linear-gradient(145deg,var(--brand),var(--accent)); background-size:cover; background-position:center; box-shadow:0 10px 22px color-mix(in srgb, var(--brand) 28%, transparent); flex-shrink:0; animation:popIn .5s cubic-bezier(.16,1,.3,1) both; }
    .brand-name { font-weight:900; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .nav { display:flex; align-items:center; gap:18px; color:var(--sub); font-size:12px; font-weight:800; }
    .nav a, .nav button { color:inherit; text-decoration:none; border:none; background:transparent; font:inherit; cursor:pointer; padding:0; }
    .mobile-actions { display:none; align-items:center; gap:8px; }
    .mobile-actions button { border:1px solid var(--border); background:var(--surface); color:var(--ink); border-radius:999px; padding:9px 11px; font-size:11px; font-weight:900; font-family:inherit; cursor:pointer; }
    .cart-btn { border:none; background:var(--ink); color:var(--surface); padding:10px 15px; border-radius:999px; font-size:12px; font-weight:900; cursor:pointer; display:flex; align-items:center; gap:8px; transition:transform .16s ease, box-shadow .16s ease; position:relative; overflow:hidden; }
    .cart-btn:hover { transform:translateY(-2px); box-shadow:0 14px 28px rgba(31,29,24,.18); }
    .cart-btn.pulse .cart-count { animation:cartPulse .38s ease both; }
    .cart-count { min-width:22px; height:22px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; background:var(--brand); color:var(--ink); font-size:11px; }
    main { max-width:1180px; margin:auto; padding:26px 20px 70px; }
    .hero { display:grid; grid-template-columns:minmax(0,1.05fr) minmax(340px,.95fr); gap:22px; align-items:stretch; min-height:430px; animation:fadeUp .45s ease both; }
    .hero-copy { position:relative; overflow:hidden; border-radius:calc(var(--radius) + 14px); padding:42px; background:linear-gradient(135deg,color-mix(in srgb,var(--brand) 82%, #0F1F19),var(--accent) 58%,color-mix(in srgb,var(--surface2) 54%, var(--brand))); background-size:180% 180%; color:#fff; display:flex; flex-direction:column; justify-content:space-between; box-shadow:var(--shadow); animation:glowSweep 9s ease-in-out infinite; will-change:background-position; }
    .hero-copy:before { content:""; position:absolute; inset-block:0; width:150px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent); animation:shimmer 4.6s ease-in-out infinite; }
    .eyebrow { position:relative; font-size:12px; font-weight:900; opacity:.76; margin-bottom:14px; }
    h1 { position:relative; margin:0; font-size:clamp(34px,5vw,66px); line-height:1.16; letter-spacing:0; max-width:720px; }
    .hero-sub { position:relative; margin:16px 0 0; color:rgba(255,255,255,.78); line-height:1.9; max-width:560px; font-size:15px; }
    .hero-actions { position:relative; display:flex; gap:10px; flex-wrap:wrap; margin-top:30px; }
    .primary, .secondary, .chip, .add, .checkout, .icon-btn, .cart-btn { position:relative; overflow:hidden; }
    .primary { border:none; background:var(--surface); color:var(--ink); padding:13px 19px; border-radius:999px; font-size:13px; font-weight:900; cursor:pointer; transition:transform .16s ease, box-shadow .16s ease; box-shadow:0 12px 28px rgba(0,0,0,.12); }
    .secondary { border:1px solid rgba(255,255,255,.42); background:rgba(255,255,255,.14); color:#fff; padding:13px 18px; border-radius:999px; font-size:13px; font-weight:900; cursor:pointer; transition:transform .16s ease, background .16s ease; }
    .primary:hover, .secondary:hover, .add:hover, .checkout:hover { transform:translateY(-2px); }
    .primary:active, .secondary:active, .add:active, .checkout:active, .chip:active, .cart-btn:active, .icon-btn:active { transform:scale(.97); }
    .ripple { position:absolute; width:10px; height:10px; border-radius:50%; background:currentColor; pointer-events:none; animation:ripple .62s ease-out forwards; mix-blend-mode:screen; }
    .hero-panel { border-radius:calc(var(--radius) + 14px); background:var(--surface); padding:16px; box-shadow:var(--shadow); display:grid; grid-template-rows:1fr auto; gap:14px; animation:slideIn .5s ease both; transform-style:preserve-3d; transition:transform .18s ease; will-change:transform; border:1px solid color-mix(in srgb,var(--border) 84%, transparent); }
    .feature-image { border-radius:calc(var(--radius) + 6px); background:var(--surface2); background-size:cover; background-position:center; min-height:292px; position:relative; overflow:hidden; transform:translateZ(18px); }
    .feature-image:after { content:""; position:absolute; inset:0; background:linear-gradient(180deg,transparent 46%,rgba(0,0,0,.28)); }
    .feature-row { display:flex; gap:10px; align-items:center; justify-content:space-between; }
    .pill { padding:7px 10px; border-radius:999px; background:var(--surface2); color:var(--accent); font-size:11px; font-weight:900; }
    .section { margin-top:34px; opacity:0; transform:translateY(24px); transition:opacity .55s ease, transform .55s cubic-bezier(.16,1,.3,1); }
    .section.in-view { opacity:1; transform:translateY(0); }
    .section-head { display:flex; align-items:end; justify-content:space-between; gap:14px; margin-bottom:14px; }
    .section-title { font-size:22px; font-weight:900; }
    .search { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:10px 14px; min-width:280px; }
    .search input { border:none; outline:none; background:transparent; color:var(--ink); width:100%; font-size:13px; }
    .filters { display:flex; gap:9px; flex-wrap:wrap; align-items:center; justify-content:flex-end; }
    .filter-select { border:1px solid var(--border); background:var(--surface); color:var(--ink); border-radius:999px; padding:10px 13px; font-size:12px; font-weight:900; outline:none; min-height:40px; }
    .toggle-chip { border:1px solid var(--border); background:var(--surface); color:var(--sub); border-radius:999px; padding:10px 13px; font-size:12px; font-weight:900; cursor:pointer; }
    .toggle-chip.active { background:var(--ink); color:var(--surface); border-color:var(--ink); }
    .chips { display:flex; gap:9px; overflow:auto; padding-bottom:4px; }
    .chip { flex:0 0 auto; border:1px solid var(--border); background:var(--surface); color:var(--sub); border-radius:999px; padding:9px 14px; font-size:12px; font-weight:900; cursor:pointer; transition:transform .16s ease, background .18s ease, color .18s ease; }
    .chip:hover { transform:translateY(-2px); }
    .chip.active { background:var(--ink); color:var(--surface); border-color:var(--ink); animation:popIn .25s ease both; }
    .trust { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .trust-card { width:100%; text-align:start; color:inherit; font-family:inherit; cursor:pointer; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; display:flex; gap:12px; align-items:center; transition:transform .18s ease, box-shadow .18s ease; }
    .trust-card:hover { transform:translateY(-4px); box-shadow:0 18px 36px rgba(31,29,24,.08); }
    .trust-icon { width:38px; height:38px; border-radius:13px; background:var(--surface2); color:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:900; }
    .trust-title { font-size:13px; font-weight:900; }
    .trust-sub { font-size:11px; color:var(--sub); margin-top:2px; }
    .offers { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .offer { border-radius:var(--radius); padding:20px; background:linear-gradient(135deg,var(--ink),color-mix(in srgb, var(--ink) 80%, var(--accent))); color:var(--surface); min-height:128px; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; position:relative; transition:transform .2s ease; }
    .offer:hover { transform:translateY(-5px) scale(1.01); }
    .offer:after { content:""; width:120px; height:120px; border-radius:50%; position:absolute; inset-inline-end:-42px; top:-36px; background:color-mix(in srgb, var(--brand) 35%, transparent); }
    .grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:16px; }
    .product { border:1px solid color-mix(in srgb,var(--border) 78%, transparent); background:var(--surface); border-radius:var(--radius); padding:10px; text-align:start; cursor:pointer; box-shadow:0 10px 30px rgba(23,33,28,.06); animation:popIn .48s cubic-bezier(.16,1,.3,1) both; transition:transform .18s ease, box-shadow .18s ease; transform-style:preserve-3d; will-change:transform; }
    .product:hover { transform:translateY(-7px) rotateX(1.2deg); box-shadow:0 22px 48px rgba(23,33,28,.14); }
    .product-img { height:205px; border-radius:calc(var(--radius) - 4px); background:var(--surface2); background-size:cover; background-position:center; margin-bottom:10px; position:relative; overflow:hidden; transition:transform .32s ease; }
    .product:hover .product-img { transform:scale(1.035); }
    .badge { position:absolute; top:10px; inset-inline-start:10px; background:color-mix(in srgb,var(--surface) 88%, transparent); color:var(--ink); border-radius:999px; padding:5px 8px; font-size:10px; font-weight:900; backdrop-filter:blur(10px); }
    .product-name { font-size:13px; font-weight:900; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .product-meta { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:6px; }
    .price { color:var(--accent); font-size:13px; font-weight:900; }
    .dots { display:flex; gap:4px; }
    .dot { width:13px; height:13px; border-radius:50%; border:1px solid rgba(0,0,0,.1); animation:dotWave 2.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay:.12s; }
    .dot:nth-child(3) { animation-delay:.24s; }
    .dot:nth-child(4) { animation-delay:.36s; }
    .variant-group { margin-top:18px; display:grid; gap:10px; }
    .variant-title { color:var(--sub); font-size:12px; font-weight:900; }
    .option-row { display:flex; flex-wrap:wrap; gap:8px; }
    .swatch-btn, .size-btn { border:1.5px solid var(--border); background:var(--surface); color:var(--ink); border-radius:13px; min-height:38px; padding:8px 11px; cursor:pointer; font-size:12px; font-weight:900; display:inline-flex; align-items:center; gap:8px; transition:transform .16s ease, border-color .16s ease, background .16s ease; }
    .swatch-btn:hover, .size-btn:hover { transform:translateY(-2px); }
    .swatch-btn.active, .size-btn.active { border-color:var(--ink); background:var(--ink); color:var(--surface); }
    .swatch-mark { width:18px; height:18px; border-radius:50%; border:1px solid rgba(0,0,0,.18); box-shadow:inset 0 0 0 2px rgba(255,255,255,.55); flex-shrink:0; }
    .selected-stock { margin-top:12px; display:inline-flex; align-items:center; border-radius:999px; padding:7px 10px; background:var(--surface2); color:var(--sub); font-size:11px; font-weight:900; }
    .add { width:100%; margin-top:10px; border:none; background:var(--ink); color:var(--surface); border-radius:13px; padding:10px; font-size:12px; font-weight:900; cursor:pointer; transition:transform .16s ease, box-shadow .16s ease; }
    .checkout[disabled], .add[disabled] { opacity:.52; cursor:not-allowed; transform:none; }
    .empty { padding:54px 20px; text-align:center; color:var(--sub); background:var(--surface); border-radius:var(--radius); grid-column:1 / -1; }
    .drawer, .modal { position:fixed; inset:0; z-index:60; pointer-events:none; opacity:0; transition:opacity .2s ease; }
    .drawer.open, .modal.open { opacity:1; pointer-events:auto; }
    .shade { position:absolute; inset:0; background:rgba(31,29,24,.42); }
    .drawer-panel { position:absolute; inset-block:0; inset-inline-end:0; width:min(420px,92vw); background:var(--bg); padding:22px; overflow:auto; transform:translateX(-20px) scale(.98); transition:transform .32s cubic-bezier(.16,1,.3,1); box-shadow:-20px 0 50px rgba(0,0,0,.16); }
    html[dir="ltr"] .drawer-panel { transform:translateX(20px); }
    .drawer.open .drawer-panel { transform:translateX(0); }
    .drawer-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    .icon-btn { border:none; background:var(--surface); width:38px; height:38px; border-radius:13px; cursor:pointer; color:var(--ink); font-weight:900; }
    .cart-item { display:grid; grid-template-columns:64px 1fr auto; gap:10px; align-items:center; background:var(--surface); border-radius:16px; padding:10px; margin-bottom:10px; animation:popIn .28s ease both; }
    .cart-img { width:64px; height:64px; border-radius:13px; background:var(--surface2); background-size:cover; background-position:center; }
    .qty { display:flex; align-items:center; gap:8px; }
    .qty button { width:28px; height:28px; border:none; border-radius:9px; background:var(--surface2); cursor:pointer; font-weight:900; }
    .total { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); display:flex; justify-content:space-between; font-weight:900; }
    .cart-breakdown { margin-top:14px; display:grid; gap:8px; }
    .summary-line { display:flex; justify-content:space-between; gap:12px; color:var(--sub); font-size:12px; font-weight:800; }
    .summary-line strong { color:var(--ink); font-size:14px; }
    .checkout { width:100%; margin-top:14px; border:none; background:var(--brand); color:var(--ink); border-radius:15px; padding:14px; font-size:13px; font-weight:900; cursor:pointer; }
    .modal-card { position:absolute; inset:50% auto auto 50%; transform:translate(-50%,-46%) scale(.92); width:min(760px,92vw); max-height:88vh; overflow:auto; background:var(--surface); border-radius:calc(var(--radius) + 8px); padding:18px; transition:transform .32s cubic-bezier(.16,1,.3,1); }
    .modal.open .modal-card { transform:translate(-50%,-50%) scale(1); }
    html[dir="rtl"] .modal-card { transform:translate(50%,-46%) scale(.98); inset:50% 50% auto auto; }
    html[dir="rtl"] .modal.open .modal-card { transform:translate(50%,-50%) scale(1); }
    .detail { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .detail-media { display:grid; gap:10px; }
    .detail-img { min-height:360px; border-radius:var(--radius); background:var(--surface2); background-size:cover; background-position:center; position:relative; overflow:hidden; }
    .gallery-nav { position:absolute; inset-block:50% auto; transform:translateY(-50%); width:36px; height:36px; border:none; border-radius:50%; background:color-mix(in srgb, var(--surface) 82%, transparent); color:var(--ink); font-weight:900; cursor:pointer; box-shadow:0 10px 22px rgba(31,29,24,.12); }
    .gallery-nav.prev { inset-inline-start:10px; }
    .gallery-nav.next { inset-inline-end:10px; }
    .thumb-row { display:flex; gap:8px; overflow:auto; padding-bottom:2px; }
    .thumb { width:58px; height:58px; border:none; border-radius:13px; background:var(--surface2); background-size:cover; background-position:center; cursor:pointer; flex:0 0 auto; opacity:.62; outline:2px solid transparent; outline-offset:2px; }
    .thumb.active { opacity:1; outline-color:var(--ink); }
    .product-description { color:var(--sub); font-size:13px; line-height:1.9; margin-top:14px; }
    .spec-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:14px; }
    .spec { background:var(--bg); border:1px solid var(--border); border-radius:13px; padding:10px; }
    .spec span { display:block; color:var(--sub); font-size:10px; font-weight:900; margin-bottom:3px; }
    .spec strong { font-size:12px; font-weight:900; }
    .checkout-form { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field.full { grid-column:1 / -1; }
    .field span { font-size:11px; font-weight:900; color:var(--sub); }
    .field input, .field select, .field textarea { width:100%; border:1.5px solid var(--border); background:var(--bg); color:var(--ink); border-radius:13px; padding:12px; outline:none; font-family:inherit; font-size:13px; }
    .field textarea { min-height:74px; resize:vertical; line-height:1.7; }
    .checkout-summary { background:var(--bg); border:1px solid var(--border); border-radius:16px; padding:13px; margin:12px 0; display:grid; gap:8px; }
    .payment-options { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; margin:12px 0; }
    .pay-option { border:1.5px solid var(--border); background:var(--surface); color:var(--ink); border-radius:15px; padding:12px; text-align:start; cursor:pointer; font-family:inherit; transition:transform .16s ease, border-color .16s ease, background .16s ease; }
    .pay-option:hover { transform:translateY(-2px); }
    .pay-option.active { border-color:var(--ink); background:var(--ink); color:var(--surface); }
    .pay-option strong { display:block; font-size:12px; font-weight:900; }
    .pay-option span { display:block; font-size:10.5px; line-height:1.6; opacity:.72; margin-top:4px; }
    .coupon-box { display:grid; grid-template-columns:1fr auto; gap:8px; margin-top:14px; }
    .coupon-box input { border:1.5px solid var(--border); background:var(--surface); color:var(--ink); border-radius:13px; padding:12px; outline:none; font-family:inherit; font-size:12px; }
    .coupon-box button { border:none; background:var(--ink); color:var(--surface); border-radius:13px; padding:0 14px; font-size:12px; font-weight:900; cursor:pointer; }
    .coupon-note { color:var(--sub); font-size:11px; font-weight:900; margin-top:7px; min-height:16px; }
    .success-card { text-align:center; padding:26px 20px 20px; }
    .success-mark { width:76px; height:76px; border-radius:50%; margin:0 auto 16px; background:linear-gradient(145deg,var(--brand),var(--accent)); color:var(--ink); display:flex; align-items:center; justify-content:center; font-size:36px; font-weight:900; box-shadow:0 18px 38px color-mix(in srgb, var(--brand) 36%, transparent); animation:popIn .48s cubic-bezier(.16,1,.3,1) both; }
    .success-title { font-size:28px; font-weight:900; line-height:1.3; }
    .success-sub { color:var(--sub); font-size:13px; line-height:1.9; margin:8px auto 0; max-width:420px; }
    .success-facts { margin:18px 0 6px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .success-fact { background:var(--bg); border:1px solid var(--border); border-radius:16px; padding:12px; }
    .success-fact span { display:block; color:var(--sub); font-size:11px; font-weight:900; margin-bottom:4px; }
    .success-fact strong { font-size:13px; font-weight:900; }
    .track-card, .policy-card { padding:22px; }
    .track-result { margin-top:14px; display:grid; gap:10px; }
    .status-steps { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }

          const variants = product.variants || {};

            const variantStocks = variants.variantStocks.map(row => {
              const rowSold = soldLines

            const colorStocks = variantStocks.reduce((acc, row) => {

              return acc;
            }, {});
            const stock = variantStocks.reduce((sum, row) => sum + (Number(row.qty) || 0), 0);
            return { ...product, stock, variants: { ...variants, variantStocks, colorStocks } };

            duration: 0.72,
            ease: 'power3.out',
            scrollTrigger: { trigger: section, start: 'top 84%', once: true },
          });
        });
        gsap.fromTo('.product', { autoAlpha: 0, y: 34, scale: 0.92 }, {
          autoAlpha: 1,
          y: 0,
          scale: 1,
          duration: 0.58,
          ease: 'back.out(1.22)',
          stagger: { amount: 0.5, from: 'start' },
          scrollTrigger: { trigger: '.grid', start: 'top 86%', once: true },
        });
        gsap.fromTo('.trust-card,.offer', { autoAlpha: 0, y: 28 }, {
          autoAlpha: 1,
          y: 0,
          duration: 0.5,
          stagger: 0.08,
          ease: 'power3.out',
          scrollTrigger: { trigger: '.trust,.offers', start: 'top 88%', once: true },
        });
        gsap.to('.feature-image', {
          yPercent: -7,
          ease: 'none',
          scrollTrigger: { trigger: '.hero', start: 'top top', end: 'bottom top', scrub: 0.7 },
        });
        if (document.querySelector('.drawer.open .drawer-panel')) {
          gsap.fromTo('.drawer.open .drawer-panel', { xPercent: -8, scale: 0.98 }, { xPercent: 0, scale: 1, duration: 0.36, ease: 'power3.out' });
          gsap.fromTo('.cart-item', { autoAlpha: 0, x: -18 }, { autoAlpha: 1, x: 0, duration: 0.3, stagger: 0.05, ease: 'power2.out' });
        }
        if (document.querySelector('.modal.open .modal-card')) {
          gsap.fromTo('.modal.open .modal-card', { autoAlpha: 0, y: 28, scale: 0.92 }, { autoAlpha: 1, y: 0, scale: 1, duration: 0.38, ease: 'back.out(1.25)' });
          gsap.fromTo('.detail-img', { scale: 1.08 }, { scale: 1, duration: 0.6, ease: 'power3.out' });
        }
        initMagnetic();
      }
      function initMagnetic() {
        if (!hasGsap() || reducedMotion()) return;
        const gsap = window.gsap;
        document.querySelectorAll('.primary,.secondary,.cart-btn,.add,.checkout,.chip,.icon-btn').forEach(el => {
          el.classList.add('magnetic');
          el.onpointermove = event => {
            if (window.matchMedia('(pointer: coarse)').matches) return;
            const rect = el.getBoundingClientRect();
            const x = (event.clientX - rect.left - rect.width / 2) * 0.16;
            const y = (event.clientY - rect.top - rect.height / 2) * 0.18;
            gsap.to(el, { x, y, duration: 0.32, ease: 'power3.out' });
          };
          el.onpointerleave = () => gsap.to(el, { x: 0, y: 0, duration: 0.42, ease: 'elastic.out(1,0.45)' });
        });
      }
      function addRipple(target, event) {
        const canRipple = target && target.matches('button,.chip,.product');
        if (!canRipple) return;
        const rect = target.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        ripple.style.left = `${event.clientX - rect.left}px`;
        ripple.style.top = `${event.clientY - rect.top}px`;
        target.appendChild(ripple);
        setTimeout(() => ripple.remove(), 650);
      }
      function flyToCart(sourceEl) {
        const source = sourceEl && sourceEl.closest('.product,.modal-card');
        const image = source && source.querySelector('.product-img,.detail-img');
        const cart = document.querySelector('.cart-btn');
        if (!image || !cart) return;
        const from = image.getBoundingClientRect();
        const to = cart.getBoundingClientRect();
        const clone = document.createElement('div');
        clone.className = 'fly-clone';
        clone.style.left = `${from.left + from.width / 2 - 41}px`;
        clone.style.top = `${from.top + from.height / 2 - 41}px`;
        clone.style.background = getComputedStyle(image).background;
        clone.style.setProperty('--fly-x', `${to.left + to.width / 2 - from.left - from.width / 2}px`);
        clone.style.setProperty('--fly-y', `${to.top + to.height / 2 - from.top - from.height / 2}px`);
        document.body.appendChild(clone);
        if (window.gsap && !reducedMotion()) {
          clone.style.animation = 'none';
          window.gsap.timeline({ onComplete: () => clone.remove() })
            .to(clone, { y: -34, scale: 1.08, rotate: -4, duration: 0.16, ease: 'power2.out' })
            .to(clone, {
              x: to.left + to.width / 2 - from.left - from.width / 2,
              y: to.top + to.height / 2 - from.top - from.height / 2,
              scale: 0.14,
              rotate: -18,
              autoAlpha: 0,
              duration: 0.56,
              ease: 'power3.inOut',
            });
          return;
        }
        setTimeout(() => clone.remove(), 760);
      }
      function pulseCart() {
        requestAnimationFrame(() => {
          const cart = document.querySelector('.cart-btn');
          if (!cart) return;
          cart.classList.add('pulse');
          if (window.gsap && !reducedMotion()) window.gsap.fromTo(cart, { scale: 1 }, { scale: 1.08, duration: 0.16, yoyo: true, repeat: 1, ease: 'power2.out' });
          setTimeout(() => cart.classList.remove('pulse'), 420);
        });
      }
      function updateScrollMotion() {
        const progress = document.getElementById('scrollProgress');
        const max = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
        const pct = Math.min(100, Math.max(0, (window.scrollY / max) * 100));
        if (progress) progress.style.width = pct + '%';
        const heroPanel = document.querySelector('.hero-panel');
        if (heroPanel && window.scrollY < 520 && !heroPanel.matches(':hover')) {
          heroPanel.style.translate = `0 ${Math.round(window.scrollY * -0.04)}px`;
        }
      }
      function sampleProducts() {
        return [
          { id:'demo1', catKey:'clothes', name:{ ar:'جاكيت كلاسيك' }, category:{ ar:'ملابس' }, price:42000, stock:12, color:'#6F8A4F', variants:{ colors:['#6F8A4F','#17211C'] } },
          { id:'demo2', catKey:'bags', name:{ ar:'حقيبة جلدية' }, category:{ ar:'حقائب' }, price:68000, stock:8, color:'#1F7668', variants:{ colors:['#1F7668','#17211C'] } },
          { id:'demo3', catKey:'accessories', name:{ ar:'إكسسوار ذهبي' }, category:{ ar:'إكسسوارات' }, price:18000, stock:30, color:'#A7B883', variants:{ colors:['#A7B883'] } },
          { id:'demo4', catKey:'shirts', name:{ ar:'قميص يومي' }, category:{ ar:'قمصان' }, price:25000, stock:17, color:'#E5EFE8', variants:{ colors:['#E5EFE8','#6F8A4F'] } },
        ];
      }
      document.addEventListener('click', event => {
        const target = event.target.closest('[data-action]');
        if (!target) return;
        addRipple(target, event);
        const action = target.dataset.action;
        const id = target.dataset.id;
        const key = target.dataset.key || id;
        if (action === 'cart') state.cartOpen = true;
        if (action === 'close-cart') state.cartOpen = false;
        if (action === 'toggle-available') state.availableOnly = !state.availableOnly;
        if (action === 'apply-coupon') applyCoupon();
        if (action === 'open-tracking') {
          state.trackingOpen = true;
          state.trackResult = null;
        }
        if (action === 'close-tracking') state.trackingOpen = false;
        if (action === 'track-order') trackOrder();
        if (action === 'open-policy') {
          state.policyOpen = true;
          state.policyTopic = target.dataset.topic || 'shipping';
        }
        if (action === 'close-policy') state.policyOpen = false;
        if (action === 'clear-filters') {
          state.category = 'all';
          state.query = '';
          state.availableOnly = false;
          render();
        }
        if (action === 'browse-from-cart') {
          state.cartOpen = false;
          render();
          setTimeout(() => document.getElementById('products')?.scrollIntoView({ behavior:'smooth', block:'start' }), 0);
        }
        if (action === 'add') addToCart(id, target);
        if (action === 'add-selected') addSelectedToCart(id, target);
        if (action === 'inc') changeQty(key, 1);
        if (action === 'dec') changeQty(key, -1);
        if (action === 'detail') {
          state.detailId = id;
          const product = state.products.find(p => p.id === id);
          if (product) selectedVariant(product);
          try {
            const recent = safeJson(localStorage.getItem('urCommerceOS.storefront.recent.v1'), []).filter(x => String(x) !== String(id));
            localStorage.setItem('urCommerceOS.storefront.recent.v1', JSON.stringify([id, ...recent].slice(0, 12)));
          } catch (err) {}
        }
        if (action === 'close-detail') state.detailId = null;
        if (action === 'gallery-prev' || action === 'gallery-next') {
          const product = state.products.find(p => p.id === id);
          if (product) {
            const count = Math.max(1, productImages(product).length);
            const current = Number(state.detailImages[id]) || 0;
            state.detailImages[id] = action === 'gallery-prev' ? (current - 1 + count) % count : (current + 1) % count;
          }
        }
        if (action === 'gallery-set') state.detailImages[id] = Number(target.dataset.index) || 0;
        if (action === 'select-color') {
          const product = state.products.find(p => p.id === id);
          if (product) {
            const current = selectedVariant(product);
            const color = colorOptions(product).find(c => c.color === target.dataset.color) || current;
            state.variantSelections[id] = { ...current, color: color.color, colorName: color.name };
          }
        }
        if (action === 'select-size') {
          const product = state.products.find(p => p.id === id);
          if (product) {
            const current = selectedVariant(product);
            state.variantSelections[id] = { ...current, size: target.dataset.size || '' };
          }
        }
        if (action === 'category') state.category = target.dataset.key || 'all';
        if (action === 'category-scroll') {
          state.category = target.dataset.key || 'all';
          render();
          setTimeout(() => document.getElementById('products')?.scrollIntoView({ behavior:'smooth', block:'start' }), 0);
        }
        if (action === 'toggle-locale') setLocale(state.locale === 'ar' ? 'en' : 'ar');
        if (action === 'retry-store') {
          state.storefront.error = '';
          state.storefront.loading = true;
          render();
          loadRemoteStorefront().then(() => render());
        }
        if (action === 'scroll-home') window.scrollTo({ top:0, behavior:'smooth' });
        if (action === 'scroll-categories') document.querySelector('.category-showcase')?.scrollIntoView({ behavior:'smooth', block:'center' });
        if (action === 'scroll-products') document.getElementById('products')?.scrollIntoView({ behavior:'smooth', block:'start' });
        if (action === 'checkout') {
          const availabilityError = checkoutAvailabilityError();
          if (availabilityError) toast(availabilityError);
          else if (!cartItems().length) toast('السلة فارغة');
          else {
            state.checkoutOpen = true;
            state.cartOpen = false;
            state.detailId = null;
            render();
          }
        }
        if (action === 'close-checkout') {
          state.checkoutOpen = false;
          render();
        }
        if (action === 'select-payment') {
          const payment = target.dataset.payment;
          if (paymentOptions().some(p => p.key === payment)) state.checkout.payment = payment;
          render();
        }
        if (action === 'submit-checkout') submitCheckout();
        if (action === 'close-success') {
          state.orderSuccess = null;
          render();
        }
        if (action === 'continue-shopping') {
          state.orderSuccess = null;
          render();
          setTimeout(() => document.getElementById('products')?.scrollIntoView({ behavior:'smooth', block:'start' }), 0);
        }
        if (action === 'track-success') {
          state.trackQuery = (state.orderSuccess && state.orderSuccess.code) || '';
          state.orderSuccess = null;
          state.trackingOpen = true;
          trackOrder();
        }
        if (!['add','add-selected','inc','dec','scroll-products','scroll-home','scroll-categories','category-scroll','retry-store','checkout','close-checkout','select-payment','submit-checkout','close-success','continue-shopping','apply-coupon','track-order','track-success'].includes(action)) render();
      });
      document.addEventListener('keydown', event => {
        if ((event.key === 'Enter' || event.key === ' ') && event.target.matches('.product')) {
          event.preventDefault();
          const id = event.target.dataset.id;
          state.detailId = id;
          try {
            const recent = safeJson(localStorage.getItem('urCommerceOS.storefront.recent.v1'), []).filter(x => String(x) !== String(id));
            localStorage.setItem('urCommerceOS.storefront.recent.v1', JSON.stringify([id, ...recent].slice(0, 12)));
          } catch (err) {}
          render();
        }
        if (event.key === 'Escape') {
          const wasOpen = state.detailId || state.cartOpen || state.checkoutOpen || state.trackingOpen || state.policyOpen;
          state.detailId = null; state.cartOpen = false; state.checkoutOpen = false; state.trackingOpen = false; state.policyOpen = false;
          if (wasOpen) render();
        }
        if (event.key === 'Tab') {
          const dialog = document.querySelector('.modal.open .modal-card, .drawer.open .drawer-panel');
          if (!dialog) return;
          const focusable = [...dialog.querySelectorAll('button:not([disabled]),a[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')];
          if (!focusable.length) return;
          const first = focusable[0], last = focusable[focusable.length - 1];
          if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
          else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
        }
      });
      function init() {
        load();
        setLocale(state.locale);
        installThemePreviewHooks();
        if (typeof window !== 'undefined' && window.__UR_STOREFRONT_TEST__) {
          render();
          return;
        }
        const remote = storefrontParams();
        if (remote.storeId && remote.key) state.storefront.loading = true;
        render();
        loadRemoteStorefront().then(() => {
          render();
        }).finally(() => {
          flushQueuedStorefrontOrders();
          if (typeof window !== 'undefined') window.addEventListener('online', flushQueuedStorefrontOrders);
        });
      }
      window.addEventListener('scroll', updateScrollMotion, { passive: true });
      window.addEventListener('resize', updateScrollMotion);
      const testApi = {
        init,
        state,
        selectedVariant,
        selectedStock,
        cartLineKey,
        cartItems,
        addSelectedToCart,
        changeQty,
        setCheckoutField,
        validateCheckout,
        buildAlWaseetPayload,
        submitCheckout,
        updateProductsAfterOrder,
        normalizePhone,
        currentShipping,
        checkoutAvailabilityError,
        availableCoupons,
        normalizeCoupon,
        couponDiscount,
        applyRemoteCoupon,
        couponValidationLineItems,
        storefrontParams,
        loadRemoteStorefront,
        orderBackendPayload,
        safeJson,
        cssUrl,
        configuredBackendBase,
        isDevelopmentHost,
        isTrustedBackendBase,
      };
      return (typeof window !== 'undefined' && window.__UR_STOREFRONT_TEST__) ? { init, addToCart, __test: testApi } : { init, addToCart };
    })();
    if (!(typeof window !== 'undefined' && window.__UR_STOREFRONT_TEST__)) Storefront.init();
  </script>
